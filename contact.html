<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" author="Cyril Faccin" keywords="Cyril, Faccin, Redzvolt, portfolios, developpeur">
  <meta description="Je m'appelle Cyril, je suis développeur web. Venez découvrir mon parcours, mes compétences et les projets sur lesquels j'ai travaillé. Que vous cherchiez de l'inspiration, un jeune travailleur curieux de nature ou un simple visiteur, vous êtes les bienvenus !">
  <title>Cyril Faccin</title>
  <link rel="icon" href="./images/logo.png">
  <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
  <header>
    <div class="background"><a class="flex_link" href="./index.html">Accueil</a></div>
    <div class="background border-left"><a class="flex_link" href="./competences.html">Mon parcours</a></div>
    <div class="background border-left"><a class="flex_link" href="./projets.html">Projets</a></div>
    <div class="background border-left"><a class="flex_link" href="./contact.html">Contact</a></div>
    <div class="background border-left"><a class="flex_link" href="https://www.linkedin.com/in/cyril-faccin" target="_blank">LinkedIn</a></div>
    <div class="background border-left"><a class="flex_link" href="https://github.com/Redzvolt" target="_blank">Github</a></div>
  </header>

  <main class="blue_background padding-top">
    <h1>Contact</h1>
    <p>Si vous désirez me contacter, vous pouvez le faire via mes réseaux, le formulaire de contact ci-dessous ou l'adresse mail : Cyril.faccin@outlook.fr</p>
    <nav class="nav_section">
      <a class="button" href="./contact.html">Contact</a>
      <a class="flex_link" href="https://www.linkedin.com/in/cyril-faccin" target="_blank"><img src="images/square-linkedin-brands-solid.png" alt="LinkedIn" height="90px" width="90px"></a>
      <a class="flex_link" href="https://github.com/Redzvolt" target="_blank"><img src="images/square-github-brands-solid.png" alt="Github" height="90px" width="90px"></a>
    </nav>
    <section class="form_section white_background">
      <form class="form_width">
        <div class="form_direction form_width">
          <label for="nom">Nom :</label>
          <input id="nom" class="dual_width form_width" type="text">
          <label for="prenom">Prénom :</label>
          <input id="prenom" class="dual_width form_width" type="text">
        </div>
        <div class="form_direction form_width">
          <label for="entreprise">Entreprise :</label>
          <input id="entreprise" class="only_width form_width" type="text">
        </div>
        <div class="form_direction form_width">
          <label for="adresse">Adresse :</label>
          <input id="adresse" class="address_width form_width" type="text">
        </div>
        <div class="form_direction form_width">
          <label for="code_postal">Pays :</label>
          <input id="code_postal" class="first_width form_width" type="text">
          <label for="ville">Ville :</label>
          <input id="ville" class="first_width form_width" type="text">
        </div>
        <div class="form_direction form_width">
          <label for="code_postal">Code Postal :</label>
          <input id="code_postal" class="second_width form_width" type="text">
          <label for="telephone">Numéro de Téléphone :</label>
          <input id="telephone" class="second_width form_width" type="tel">
        </div>
        <div class="form_direction form_width">
          <label for="email">E-mail :</label>
          <input id="email" class="mail_width form_width" type="email">
        </div>
        <div class="comment_direction form_width">
          <label for="commentaire">Commentaire :</label>
          <textarea name="comment" id="commentaire" class="comment form_width"></textarea>
        </div>
        <div class="form_direction form_width">
          <input type="submit" value="Envoyer mon message" class="button">
          <button class="button" type="reset">Annuler</button>
        </div>
      </form>
    </section>
  </main>

  <footer>
    <p>Fait par Cyril Faccin, aussi connu sous le nom de Redzvolt.</p>
    <button id="scrollup"></button>
  </footer>

  <script src="./javascript/scroll.js"></script>
</body>
</html>
